<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ubah Detail Pelanggan Rekapan Mitra</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --surface: #ffffff;
            --bg: #f9fafb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .input-card {
            @apply bg-white rounded-xl shadow-sm border border-slate-200 p-4 w-full transition-all focus-within:ring-2 focus-within:ring-emerald-500 focus-within:border-emerald-500;
        }
        .input-label {
            @apply block text-sm font-extrabold text-slate-500 uppercase tracking-wide mb-1.5;
        }
        .input-field {
            @apply w-full text-lg font-bold text-slate-900 placeholder-slate-300 border-0 border-b-2 border-slate-200 focus:border-emerald-600 focus:ring-0 px-0 py-2 bg-transparent transition-colors;
        }
        .status-card {
            @apply flex flex-col items-center justify-center p-4 rounded-xl border-2 transition-all cursor-pointer h-24 relative;
        }
        .status-card.active {
            @apply bg-emerald-600 border-emerald-600 text-white shadow-lg shadow-emerald-100;
        }
        .status-card.inactive {
            @apply bg-white border-slate-200 text-slate-500 hover:bg-slate-50;
        }
        .tier-card {
            @apply flex items-center justify-between p-4 rounded-xl border-2 transition-all cursor-pointer bg-white mb-3;
        }
        .tier-card.active {
            @apply border-emerald-500 bg-emerald-50 ring-1 ring-emerald-500;
        }
        .tier-card.inactive {
            @apply border-slate-200 hover:border-slate-300;
        }
    </style>
    <style>
        body {
            min-height: max(800px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="text-slate-900 bg-slate-50">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-24">
        <header class="px-4 pt-4 pb-2 bg-white z-10 sticky top-0 shadow-sm border-b border-slate-100">
            <div class="flex items-center gap-3">
                <button
                    class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-600 active:bg-slate-200 transition-colors">
                    <span class="material-symbols-outlined text-2xl">arrow_back</span>
                </button>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900">Ubah Detail Pelanggan</h1>
            </div>
        </header>
        <main class="flex-1 space-y-6 py-6 px-4 relative z-0">
            <section class="space-y-4">
                <div class="input-card">
                    <label class="input-label" for="nama">Nama Pelanggan</label>
                    <div class="flex items-center">
                        <span class="material-symbols-outlined text-slate-400 mr-2 text-2xl">person</span>
                        <input class="input-field" id="nama" placeholder="Contoh: Budi Santoso" type="text"
                            value="Budi Santoso" />
                    </div>
                </div>
                <div class="input-card">
                    <label class="input-label" for="whatsapp">No. WhatsApp</label>
                    <div class="flex items-center">
                        <span class="material-symbols-outlined text-slate-400 mr-2 text-2xl">call</span>
                        <input class="input-field" id="whatsapp" placeholder="08..." type="tel" value="081234567890" />
                    </div>
                </div>
                <div class="input-card">
                    <label class="input-label" for="alamat">Alamat Lengkap</label>
                    <div class="flex items-start">
                        <span class="material-symbols-outlined text-slate-400 mr-2 text-2xl mt-1">location_on</span>
                        <textarea class="input-field resize-none h-20" id="alamat"
                            placeholder="Nama jalan, nomor rumah, kota...">Jl. Merpati No. 45, RT 02/RW 05, Tebet, Jakarta Selatan</textarea>
                    </div>
                </div>
            </section>
            <section>
                <h2 class="text-base font-extrabold text-slate-800 mb-3 flex items-center gap-2">
                    <span class="material-symbols-outlined text-emerald-600">badge</span>
                    Status Pelanggan
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="status-card inactive">
                        <span class="material-symbols-outlined text-3xl mb-1">person</span>
                        <span class="text-sm font-black uppercase tracking-wider">Konsumen</span>
                    </div>
                    <div class="status-card active">
                        <div class="absolute top-2 right-2 bg-white text-emerald-600 rounded-full p-0.5">
                            <span class="material-symbols-outlined text-sm font-bold block">check</span>
                        </div>
                        <span class="material-symbols-outlined text-3xl mb-1">storefront</span>
                        <span class="text-sm font-black uppercase tracking-wider">Mitra</span>
                    </div>
                </div>
            </section>
            <section class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                <h2 class="text-base font-extrabold text-slate-800 mb-3 flex items-center gap-2">
                    <span class="material-symbols-outlined text-emerald-600">stars</span>
                    Level Mitra
                </h2>
                <div class="space-y-3">
                    <div class="tier-card inactive group">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 group-hover:bg-emerald-50 group-hover:text-emerald-500 transition-colors">
                                <span class="material-symbols-outlined text-2xl">shopping_bag</span>
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800 text-lg">Reseller</h3>
                                <p class="text-xs text-slate-500 font-medium">Min. Order 10 Pcs</p>
                            </div>
                        </div>
                        <div class="w-6 h-6 rounded-full border-2 border-slate-300"></div>
                    </div>
                    <div class="tier-card active">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                                <span class="material-symbols-outlined text-2xl">store</span>
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-900 text-lg">Agen</h3>
                                <p class="text-xs text-emerald-600 font-bold">Level Saat Ini</p>
                            </div>
                        </div>
                        <div
                            class="w-6 h-6 rounded-full bg-emerald-600 border-2 border-emerald-600 flex items-center justify-center">
                            <span class="material-symbols-outlined text-white text-sm font-bold">check</span>
                        </div>
                    </div>
                    <div class="tier-card inactive group">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 group-hover:bg-emerald-50 group-hover:text-emerald-500 transition-colors">
                                <span class="material-symbols-outlined text-2xl">local_shipping</span>
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800 text-lg">Distributor</h3>
                                <p class="text-xs text-slate-500 font-medium">Min. Order 100 Pcs</p>
                            </div>
                        </div>
                        <div class="w-6 h-6 rounded-full border-2 border-slate-300"></div>
                    </div>
                </div>
            </section>
        </main>
        <div
            class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white/95 backdrop-blur-sm border-t border-slate-100 z-10">
            <button
                class="w-full h-16 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl shadow-lg shadow-emerald-200 flex items-center justify-center gap-2 active:scale-[0.98] active:bg-emerald-800 transition-all">
                <span class="material-symbols-outlined text-3xl">save</span>
                <span class="text-xl font-black tracking-tight uppercase">Simpan Perubahan</span>
            </button>
        </div>
    </div>

</body>

</html>
