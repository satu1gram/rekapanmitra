<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Beranda SimpleBiz 2026 Konsisten</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --surface: #ffffff;
            --bg: #f3f4f6;
            --dark-card: #111827;
            --accent: #34d399;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .nav-item.active {
            color: var(--primary);
        }
        .nav-item.active span {
            font-variation-settings: 'FILL' 1;
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .tap-target-lg {
            min-height: 48px;
            min-width: 48px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="text-slate-900 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-32 bg-gray-50">
        <header class="px-6 pt-12 pb-6 bg-white rounded-b-[2.5rem] shadow-sm z-10 sticky top-0">
            <div class="flex flex-col gap-5">
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 leading-[1.1]">Halo,<br />Selamat
                        Pagi!</h1>
                </div>
                <button
                    class="flex items-center justify-between w-full bg-slate-50 p-5 rounded-2xl border-2 border-slate-200 active:bg-slate-200 transition-colors focus:ring-4 focus:ring-emerald-100 outline-none">
                    <div class="flex items-center gap-4">
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                            <span class="material-symbols-outlined text-slate-800 text-3xl">calendar_month</span>
                        </div>
                        <div class="text-left">
                            <p class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-0.5">Bulan Ini</p>
                            <p class="text-xl font-black text-slate-900">Februari 2026</p>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-slate-900 text-4xl">arrow_drop_down</span>
                </button>
            </div>
        </header>
        <main class="flex-1 px-6 py-6 space-y-6">
            <section
                class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden ring-4 ring-slate-100">
                <div
                    class="absolute -top-10 -right-10 w-48 h-48 bg-emerald-600 rounded-full blur-3xl opacity-25 pointer-events-none">
                </div>
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-3 opacity-90">
                        <div class="p-2 bg-emerald-500/20 rounded-lg">
                            <span class="material-symbols-outlined text-emerald-400">trending_up</span>
                        </div>
                        <span class="font-bold text-lg tracking-wide text-slate-100">Total Keuntungan</span>
                    </div>
                    <div class="flex items-baseline gap-1 mt-3">
                        <span class="text-emerald-400 text-3xl font-bold">Rp</span>
                        <span
                            class="text-[3.5rem] leading-none font-black tracking-tight text-emerald-400 drop-shadow-lg">8.450.000</span>
                    </div>
                    <div
                        class="mt-8 flex items-center gap-3 bg-white/10 w-fit px-5 py-3 rounded-2xl backdrop-blur-md border border-white/5">
                        <span class="material-symbols-outlined text-emerald-400 text-xl font-bold">arrow_upward</span>
                        <span class="font-bold text-base text-white">+12% dari Januari</span>
                    </div>
                </div>
            </section>
            <section class="grid grid-cols-2 gap-5">
                <div
                    class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-slate-100 flex flex-col justify-between h-48 active:border-blue-200 transition-colors">
                    <div class="flex items-start justify-between">
                        <div class="p-3.5 bg-blue-50 text-blue-700 rounded-2xl">
                            <span class="material-symbols-outlined text-3xl">payments</span>
                        </div>
                    </div>
                    <div>
                        <p class="text-slate-500 font-bold text-sm uppercase tracking-wide">Omset</p>
                        <p class="text-3xl font-black text-slate-900 mt-1 tracking-tight">14.2jt</p>
                    </div>
                </div>
                <div
                    class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-slate-100 flex flex-col justify-between h-48 active:border-orange-200 transition-colors">
                    <div class="flex items-start justify-between">
                        <div class="p-3.5 bg-orange-50 text-orange-700 rounded-2xl">
                            <span class="material-symbols-outlined text-3xl">shopping_bag</span>
                        </div>
                    </div>
                    <div>
                        <p class="text-slate-500 font-bold text-sm uppercase tracking-wide">Terjual</p>
                        <p class="text-3xl font-black text-slate-900 mt-1 tracking-tight">124 pcs</p>
                    </div>
                </div>
                <button
                    class="col-span-2 bg-white p-6 rounded-[2rem] shadow-sm border-2 border-slate-100 flex items-center justify-between w-full active:bg-slate-50 transition-colors text-left group">
                    <div class="flex items-center gap-5">
                        <div class="p-4 bg-red-50 text-red-600 rounded-2xl group-active:scale-95 transition-transform">
                            <span class="material-symbols-outlined text-4xl">inventory_2</span>
                        </div>
                        <div>
                            <p class="text-slate-500 font-bold text-sm uppercase tracking-wide">Stok Sisa</p>
                            <p class="text-[2.5rem] font-black text-slate-900 mt-1 leading-none">85 Item</p>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-full group-active:bg-slate-200 transition-colors">
                        <span
                            class="material-symbols-outlined text-slate-400 text-4xl group-active:text-slate-600">chevron_right</span>
                    </div>
                </button>
            </section>
        </main>
        <div class="fixed bottom-[6.5rem] left-0 right-0 px-6 z-20 pointer-events-none">
            <div class="flex gap-4 pointer-events-auto max-w-md mx-auto">
                <button
                    class="flex-1 bg-emerald-600 hover:bg-emerald-700 active:scale-95 active:bg-emerald-800 transition-all text-white py-5 px-6 rounded-[1.75rem] shadow-xl shadow-emerald-200 flex flex-col items-center justify-center gap-1 border-b-4 border-emerald-800">
                    <span class="material-symbols-outlined text-[2rem]">add_circle</span>
                    <span class="font-extrabold text-lg tracking-wide">Tambah Order</span>
                </button>
                <button
                    class="flex-1 bg-slate-800 hover:bg-slate-900 active:scale-95 active:bg-black transition-all text-white py-5 px-6 rounded-[1.75rem] shadow-xl shadow-slate-300 flex flex-col items-center justify-center gap-1 border-b-4 border-slate-950">
                    <span class="material-symbols-outlined text-[2rem]">local_shipping</span>
                    <span class="font-extrabold text-lg tracking-wide">Restok</span>
                </button>
            </div>
        </div>
        <nav
            class="fixed bottom-0 w-full bg-white border-t border-slate-200 pb-safe pt-2 z-10 max-w-md mx-auto rounded-t-[2rem] shadow-[0_-8px_30px_rgba(0,0,0,0.04)]">
            <div class="flex justify-around items-end h-[5.5rem] pb-5 px-2">
                <button
                    class="nav-item active flex flex-col items-center justify-center w-full gap-1.5 p-2 text-emerald-700 tap-target-lg">
                    <span class="material-symbols-outlined text-[2.25rem]">dashboard</span>
                    <span class="text-xs font-bold tracking-wide">Beranda</span>
                </button>
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1.5 p-2 text-slate-400 hover:text-slate-600 active:text-slate-800 tap-target-lg">
                    <span class="material-symbols-outlined text-[2.25rem]">receipt_long</span>
                    <span class="text-xs font-bold tracking-wide">Riwayat</span>
                </button>
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1.5 p-2 text-slate-400 hover:text-slate-600 active:text-slate-800 tap-target-lg">
                    <span class="material-symbols-outlined text-[2.25rem]">inventory</span>
                    <span class="text-xs font-bold tracking-wide">Produk</span>
                </button>
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1.5 p-2 text-slate-400 hover:text-slate-600 active:text-slate-800 tap-target-lg">
                    <span class="material-symbols-outlined text-[2.25rem]">settings</span>
                    <span class="text-xs font-bold tracking-wide">Akun</span>
                </button>
            </div>
        </nav>
    </div>

</body>

</html>
