<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Beranda SimpleBiz 2026 Compact</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --surface: #ffffff;
            --bg: #f8fafc;
            --dark-card: #0f172a;
            --accent: #10b981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            -webkit-font-smoothing: antialiased;
        }
        .nav-item.active {
            color: var(--primary);
        }
        .nav-item.active span {
            font-variation-settings: 'FILL' 1;
        }
        .tap-target-lg {
            min-height: 48px;
            min-width: 48px;
        }
        .compact-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="text-slate-900">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-32 bg-slate-50">
        <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-5 py-4">
            <div class="flex items-center justify-between">
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Halo,
                        Selamat Pagi</span>
                    <h1 class="text-lg font-black text-slate-900 leading-none">Beranda Anda</h1>
                </div>
                <button
                    class="flex items-center gap-2 bg-slate-900 text-white px-4 py-2.5 rounded-full shadow-lg active:scale-95 transition-transform">
                    <span class="text-sm font-black tracking-tight">Februari 2026</span>
                    <span class="material-symbols-outlined text-sm">expand_more</span>
                </button>
            </div>
        </header>
        <main class="flex-1 px-4 py-4 space-y-3">
            <section
                class="bg-slate-900 rounded-[2rem] p-6 text-white shadow-2xl relative overflow-hidden ring-1 ring-white/10">
                <div class="absolute -top-12 -right-12 w-40 h-40 bg-emerald-500/20 rounded-full blur-3xl"></div>
                <div class="relative z-10 flex flex-col">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Keuntungan</span>
                        <div class="bg-emerald-500/20 px-2 py-1 rounded-md flex items-center gap-1">
                            <span
                                class="material-symbols-outlined text-xs text-emerald-400 font-bold">trending_up</span>
                            <span class="text-[10px] font-black text-emerald-400">+12%</span>
                        </div>
                    </div>
                    <div class="flex items-baseline gap-1">
                        <span class="text-emerald-400 text-2xl font-black">Rp</span>
                        <span class="text-5xl font-black tracking-tighter text-emerald-400">8.450.000</span>
                    </div>
                </div>
            </section>
            <div class="compact-grid">
                <div class="bg-white p-5 rounded-[1.75rem] border-2 border-slate-100 shadow-sm flex flex-col gap-2">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
                            <span class="material-symbols-outlined text-blue-600 text-xl font-bold">payments</span>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Omset</span>
                    </div>
                    <p class="text-3xl font-black text-slate-900 tracking-tighter">14.2jt</p>
                </div>
                <div class="bg-white p-5 rounded-[1.75rem] border-2 border-slate-100 shadow-sm flex flex-col gap-2">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center">
                            <span
                                class="material-symbols-outlined text-orange-600 text-xl font-bold">shopping_bag</span>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Terjual</span>
                    </div>
                    <div class="flex items-baseline gap-1">
                        <span class="text-3xl font-black text-slate-900 tracking-tighter">124</span>
                        <span class="text-xs font-bold text-slate-400">pcs</span>
                    </div>
                </div>
                <button
                    class="col-span-2 bg-white p-5 rounded-[1.75rem] border-2 border-slate-100 shadow-sm flex items-center justify-between active:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-red-50 flex items-center justify-center">
                            <span class="material-symbols-outlined text-red-600 text-3xl font-bold">inventory_2</span>
                        </div>
                        <div class="flex flex-col text-left">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Stok
                                Tersedia</span>
                            <p class="text-4xl font-black text-slate-900 tracking-tighter leading-none">85 Item</p>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-slate-300 text-3xl">chevron_right</span>
                </button>
            </div>
        </main>
        <div class="fixed bottom-[6.5rem] left-0 right-0 px-4 z-40 pointer-events-none">
            <div class="flex gap-3 pointer-events-auto max-w-md mx-auto">
                <button
                    class="flex-1 bg-emerald-600 active:scale-95 active:bg-emerald-700 transition-all text-white py-5 px-4 rounded-[1.5rem] shadow-xl shadow-emerald-200/50 flex flex-col items-center justify-center border-b-4 border-emerald-800">
                    <span class="material-symbols-outlined text-3xl mb-1">add_circle</span>
                    <span class="font-black text-sm uppercase tracking-wide">Tambah Order</span>
                </button>
                <button
                    class="flex-1 bg-slate-900 active:scale-95 active:bg-black transition-all text-white py-5 px-4 rounded-[1.5rem] shadow-xl shadow-slate-300/50 flex flex-col items-center justify-center border-b-4 border-slate-950">
                    <span class="material-symbols-outlined text-3xl mb-1">local_shipping</span>
                    <span class="font-black text-sm uppercase tracking-wide">Restok</span>
                </button>
            </div>
        </div>
        <nav
            class="fixed bottom-0 w-full bg-white border-t border-slate-100 pb-safe pt-2 z-30 max-w-md mx-auto rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.06)]">
            <div class="flex justify-around items-end h-[5rem] pb-4 px-2">
                <button class="nav-item active flex flex-col items-center justify-center w-full gap-1 tap-target-lg">
                    <span class="material-symbols-outlined text-[2rem]">dashboard</span>
                    <span class="text-[10px] font-black uppercase tracking-tighter">Beranda</span>
                </button>
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1 text-slate-400 tap-target-lg">
                    <span class="material-symbols-outlined text-[2rem]">receipt_long</span>
                    <span class="text-[10px] font-black uppercase tracking-tighter">Riwayat</span>
                </button>
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1 text-slate-400 tap-target-lg">
                    <span class="material-symbols-outlined text-[2rem]">inventory</span>
                    <span class="text-[10px] font-black uppercase tracking-tighter">Produk</span>
                </button>
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1 text-slate-400 tap-target-lg">
                    <span class="material-symbols-outlined text-[2rem]">settings</span>
                    <span class="text-[10px] font-black uppercase tracking-tighter">Akun</span>
                </button>
            </div>
        </nav>
    </div>

</body>

</html>
