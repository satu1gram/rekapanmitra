<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Express Order Flow</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --surface: #ffffff;
            --bg: #f9fafb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .quick-tap-active:active {
            transform: scale(0.95);
            background-color: #ecfdf5;
        }.keypad-btn {
            @apply flex items-center justify-center text-2xl font-bold bg-white rounded-xl shadow-sm border border-slate-200 active:bg-emerald-50 active:border-emerald-500 transition-colors h-14;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="text-slate-900">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-32">
        <header class="px-6 pt-8 pb-4 bg-white z-10 relative">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Express Order</h1>
                    <p class="text-emerald-600 font-semibold flex items-center gap-1 mt-1">
                        <span class="material-symbols-outlined text-sm">bolt</span>
                        Mode Cepat Aktif
                    </p>
                </div>
                <button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-500">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
        </header>
        <main class="flex-1 space-y-8 py-4 relative z-0">
            <section class="px-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-emerald-600">person_search</span>
                        Pilih Pelanggan
                    </h2>
                    <button class="text-emerald-600 text-sm font-bold">+ Baru</button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button
                        class="quick-tap-active flex flex-col items-start p-4 bg-emerald-600 text-white rounded-2xl shadow-md border-2 border-emerald-600 transition-all text-left">
                        <span class="text-[10px] uppercase tracking-widest font-black opacity-80 mb-1">Terakhir</span>
                        <span class="text-lg font-bold leading-tight">Budi Santoso</span>
                        <span class="text-xs opacity-90 mt-1">Agen • Jakarta</span>
                    </button>
                    <button
                        class="quick-tap-active flex flex-col items-start p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm transition-all text-left">
                        <span
                            class="text-[10px] uppercase tracking-widest font-black text-slate-400 mb-1">Favorit</span>
                        <span class="text-lg font-bold leading-tight text-slate-800">Siti Aminah</span>
                        <span class="text-xs text-slate-500 mt-1">Reseller • Depok</span>
                    </button>
                    <button
                        class="quick-tap-active flex flex-col items-start p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm transition-all text-left">
                        <span
                            class="text-[10px] uppercase tracking-widest font-black text-slate-400 mb-1">Favorit</span>
                        <span class="text-lg font-bold leading-tight text-slate-800">Agus Salim</span>
                        <span class="text-xs text-slate-500 mt-1">Satuan • Bogor</span>
                    </button>
                    <button
                        class="quick-tap-active flex items-center justify-center p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-300 transition-all text-slate-500">
                        <span class="material-symbols-outlined mr-2">search</span>
                        <span class="font-bold">Cari Lainnya</span>
                    </button>
                </div>
            </section>
            <section>
                <div class="px-6 flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-emerald-600">inventory_2</span>
                        Produk Terlaris
                    </h2>
                </div>
                <div class="flex overflow-x-auto gap-4 px-6 pb-4 hide-scrollbar">
                    <div
                        class="flex-shrink-0 w-64 bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden relative group">
                        <div class="h-40 bg-slate-200 relative overflow-hidden">
                            <img alt="Product" class="w-full h-full object-cover"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4NfYzyN3eKdPrW8y1rS-mSh9lk75qCRyeBL2IQD_b5HyKPBQ8CFRreejhIKOGUP82mFMrxL8HPEjPB75O_PIYqwUoKZARNkmDsYFRCuxzHOL2UePCt6tFrVtnUa8xaUsYTVk6YIp0dTjYeD73bWb1CJU2S0EBlZxqsomF8AryHOENBss4_FHGLzbbcFqe8VBvB5hmw6r1tm8PCWdBEMUe1a5J9nZQMC3Ka-dco-OzR7Kps9sbIrmIgF1XtR9X2A6VZ6vNqdmiKc4" />
                            <div
                                class="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter text-emerald-700">
                                STOK 132</div>
                        </div>
                        <div class="p-5">
                            <h3 class="text-xl font-bold text-slate-800 leading-tight">Herbal Drink A</h3>
                            <button
                                class="mt-2 flex items-center gap-2 px-3 py-1 -ml-3 rounded-lg hover:bg-slate-50 active:bg-emerald-50 transition-colors w-full text-left border border-transparent hover:border-slate-200"
                                onclick="document.getElementById('custom-price-modal').classList.remove('hidden')">
                                <span class="text-emerald-600 font-bold text-lg">Rp 250.000</span>
                                <span
                                    class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                                    <span class="material-symbols-outlined text-sm">edit</span>
                                </span>
                            </button>
                            <div class="mt-4 flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <button
                                        class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-slate-400 active:bg-slate-50">
                                        <span class="material-symbols-outlined">remove</span>
                                    </button>
                                    <span class="text-2xl font-black w-8 text-center">0</span>
                                </div>
                                <button
                                    class="w-16 h-16 rounded-2xl bg-emerald-600 text-white shadow-lg shadow-emerald-200 flex items-center justify-center active:scale-90 transition-transform">
                                    <span class="material-symbols-outlined text-4xl font-bold">add</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div
                        class="flex-shrink-0 w-64 bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden relative opacity-70">
                        <div class="h-40 bg-slate-200 relative overflow-hidden">
                            <img alt="Product" class="w-full h-full object-cover"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBOTTbiCbIy3JcqW8CK08EhqygfiNpNg8VHTcTp21eW5priYGY2QqugNRvsgvZjLj5-ZBBm6He0YcGcg_lwgc4qPy8rve3mQGcrh52gu7L6H5vhZBXGRE08f267O8iXQUnRsQb0la_0N3QzJ0Nb1sonf9cOHKpFkgBXfRbyPoRGszj2-F_B0MQiBIRHX_kmdTOUNirqffTjurkOKlCKx-eO74XQDcNCPxdj28B1F30pTXWFoiy5Jk5FEhJH6CjDiGshzgj9Rf6FZGc" />
                            <div
                                class="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter text-emerald-700">
                                STOK 45</div>
                        </div>
                        <div class="p-5">
                            <h3 class="text-xl font-bold text-slate-800 leading-tight">Detox Tea Special</h3>
                            <button
                                class="mt-2 flex items-center gap-2 px-3 py-1 -ml-3 rounded-lg hover:bg-slate-50 active:bg-emerald-50 transition-colors w-full text-left border border-transparent hover:border-slate-200"
                                onclick="document.getElementById('custom-price-modal').classList.remove('hidden')">
                                <span class="text-emerald-600 font-bold text-lg">Rp 185.000</span>
                                <span
                                    class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                                    <span class="material-symbols-outlined text-sm">edit</span>
                                </span>
                            </button>
                            <div class="mt-4 flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <button
                                        class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-slate-400">
                                        <span class="material-symbols-outlined">remove</span>
                                    </button>
                                    <span class="text-2xl font-black w-8 text-center">0</span>
                                </div>
                                <button
                                    class="w-16 h-16 rounded-2xl bg-emerald-600 text-white shadow-lg shadow-emerald-200 flex items-center justify-center active:scale-90 transition-transform">
                                    <span class="material-symbols-outlined text-4xl font-bold">add</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section class="px-6">
                <div class="bg-slate-900 text-white rounded-3xl p-6 shadow-2xl relative overflow-hidden">
                    <div
                        class="absolute top-0 right-0 bg-amber-400 text-slate-900 text-[10px] font-black px-3 py-1 rounded-bl-xl uppercase tracking-wider flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">price_change</span>
                        Harga Custom Aktif
                    </div>
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-slate-400 font-medium">Ringkasan Pesanan</span>
                        <span class="bg-emerald-500 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Baru</span>
                    </div>
                    <div class="space-y-2 mb-6">
                        <div class="flex justify-between items-end">
                            <span class="text-slate-300">Total Harga</span>
                            <span class="text-2xl font-black">Rp 250.000</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-emerald-400 font-bold">Estimasi Profit</span>
                            <span class="text-emerald-400 text-xl font-black">Rp 45.000</span>
                        </div>
                    </div>
                    <button
                        class="w-full py-4 bg-white/10 rounded-2xl border border-white/20 text-slate-300 font-bold flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">tune</span>
                        Opsi Pengiriman &amp; Lainnya
                    </button>
                </div>
            </section>
        </main>
        <div
            class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-gradient-to-t from-white via-white to-transparent pointer-events-none z-10">
            <div class="pointer-events-auto">
                <button
                    class="w-full h-20 bg-emerald-600 hover:bg-emerald-700 text-white rounded-[2rem] shadow-2xl shadow-emerald-200 flex items-center justify-center gap-4 active:scale-95 transition-all">
                    <span class="text-2xl font-black tracking-tight">SIMPAN ORDER</span>
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined font-bold">arrow_forward</span>
                    </div>
                </button>
            </div>
        </div>
        <div class="hidden fixed inset-0 z-50 flex items-end justify-center sm:items-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in duration-200"
            id="custom-price-modal">
            <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden p-6 relative">
                <button
                    class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500"
                    onclick="document.getElementById('custom-price-modal').classList.add('hidden')">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <div class="text-center mb-6">
                    <h3 class="text-slate-500 text-sm font-bold uppercase tracking-wide">Ubah Harga Satuan</h3>
                    <p class="text-slate-800 font-bold text-lg leading-tight mt-1">Herbal Drink A</p>
                </div>
                <div class="relative mb-6">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-slate-400 font-bold text-2xl">Rp</span>
                    </div>
                    <input
                        class="w-full pl-14 pr-4 py-4 text-4xl font-black text-emerald-600 bg-slate-50 border-2 border-emerald-500 rounded-2xl focus:ring-0 focus:border-emerald-600 text-center shadow-inner"
                        readonly="" type="text" value="250.000" />
                </div>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <button class="keypad-btn">1</button>
                    <button class="keypad-btn">2</button>
                    <button class="keypad-btn">3</button>
                    <button class="keypad-btn">4</button>
                    <button class="keypad-btn">5</button>
                    <button class="keypad-btn">6</button>
                    <button class="keypad-btn">7</button>
                    <button class="keypad-btn">8</button>
                    <button class="keypad-btn">9</button>
                    <button class="keypad-btn bg-slate-100 text-slate-500 text-lg">C</button>
                    <button class="keypad-btn">0</button>
                    <button class="keypad-btn bg-slate-100 text-slate-500">
                        <span class="material-symbols-outlined">backspace</span>
                    </button>
                </div>
                <div class="flex gap-3">
                    <button class="flex-1 py-4 bg-slate-100 text-slate-700 font-bold rounded-2xl"
                        onclick="document.getElementById('custom-price-modal').classList.add('hidden')">Batal</button>
                    <button
                        class="flex-1 py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-200"
                        onclick="document.getElementById('custom-price-modal').classList.add('hidden')">Simpan</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
