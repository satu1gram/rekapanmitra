<!DOCTYPE html>
<html lang="id">

<head>

    <title>Form Order Baru Rekapan Mitra</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"

    <style type="text/tailwindcss">
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --surface: #ffffff;
            --bg: #f9fafb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .quick-tap-active:active {
            transform: scale(0.97);
            background-color: #ecfdf5;
        }
        .keypad-btn {

        }

    <style>
        body {
            min-height: max(600px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);

    </style>
    <style>

<body class="text-slate-900 bg-slate-50">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-24">

        <main class="flex-1 space-y-3 py-3 relative z-0">

                            <h3 class="text-sm font-bold text-slate-800 leading-tight truncate">Herbal Drink A</h3>
                            <button

                                    <span class="material-symbols-outlined text-xl">remove</span>

                                    <span class="material-symbols-outlined text-2xl font-bold">add</span>

                    </div>

                            <img alt="Product" class="w-full h-full object-cover"

                        </div>

                                onclick="document.getElementById('custom-price-modal').classList.remove('hidden')">
                                <span class="text-emerald-600 font-bold text-sm">Rp 185.000</span>
                                <span class="material-symbols-outlined text-[10px] text-slate-400">edit</span>
                            </button>
                            <div class="mt-2 flex items-center justify-between gap-1">
                                <button

                                    <span class="material-symbols-outlined text-xl">remove</span>

                                <div class="flex flex-col items-center">
                                    <button class="qty-input flex items-center justify-center"

                                </div>
                                <button
                                    class="w-10 h-10 rounded-lg bg-emerald-600 text-white shadow-md shadow-emerald-100 flex items-center justify-center active:bg-emerald-700 active:scale-95 transition-all touch-manipulation">

                                </button>
                            </div>

                    </div>

                        </div>

                        </div>

                    <button

            <button

                <span class="text-lg font-bold tracking-tight">REVIEW ORDER</span>
                <span class="material-symbols-outlined font-bold text-sm">arrow_forward</span>
            </button>
        </div>
        <div class="hidden fixed inset-0 z-50 flex items-end justify-center sm:items-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in duration-200"
            id="custom-price-modal">
            <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden p-5 relative mb-4 sm:mb-0">
                <button
                    class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 active:bg-slate-100"
                    onclick="document.getElementById('custom-price-modal').classList.add('hidden')">
                    <span class="material-symbols-outlined text-lg">close</span>
                </button>

                    <h3 class="text-slate-500 text-xs font-bold uppercase tracking-wide">Ubah Harga Satuan</h3>
                    <p class="text-slate-800 font-bold text-base leading-tight mt-1">Herbal Drink A</p>
                </div>

                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">

                    </div>

                    <button class="keypad-btn">2</button>
                    <button class="keypad-btn">3</button>
                    <button class="keypad-btn">4</button>
                    <button class="keypad-btn">5</button>
                    <button class="keypad-btn">6</button>
                    <button class="keypad-btn">7</button>
                    <button class="keypad-btn">8</button>
                    <button class="keypad-btn">9</button>

                    <p class="text-slate-800 font-bold text-base leading-tight mt-1">Herbal Drink A</p>

                        readonly="" type="text" value="12" />
                </div>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <button class="keypad-btn text-3xl">1</button>
                    <button class="keypad-btn text-3xl">2</button>
                    <button class="keypad-btn text-3xl">3</button>
                    <button class="keypad-btn text-3xl">4</button>
                    <button class="keypad-btn text-3xl">5</button>

                    <button class="keypad-btn text-3xl">8</button>
