<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Grafik Performa Bisnis Tahunan SimpleBiz</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --surface: #ffffff;
            --bg: #f3f4f6;
            --dark-card: #1f2937;
            --accent: #10b981;
            --active-blue: #1d4ed8;}
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .nav-item.active {
            color: var(--primary);
        }
        .nav-item.active span {
            font-variation-settings: 'FILL' 1;
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }.chart-bar-container {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 200px;
            width: 100%;
            gap: 4px;
        }
        .chart-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
            justify-content: flex-end;
        }
        .bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            transition: height 0.3s ease;
            min-height: 4px;
        }
        .bar-label {
            font-size: 10px;
            font-weight: 700;
            margin-top: 6px;
            color: #64748b;
            text-transform: uppercase;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="text-slate-900 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-32 bg-gray-50">
        <header class="px-6 pt-10 pb-6 bg-white rounded-b-[2rem] shadow-sm z-10 sticky top-0">
            <div class="flex flex-col gap-4">
                <div class="flex items-center gap-4">
                    <button class="p-2 -ml-2 rounded-full hover:bg-slate-100 active:bg-slate-200">
                        <span class="material-symbols-outlined text-3xl text-slate-900">arrow_back</span>
                    </button>
                    <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 leading-tight">Grafik Performa 2026
                    </h1>
                </div>
                <div class="mt-1 mb-2">
                    <p class="text-slate-500 font-bold text-sm uppercase mb-2 ml-1">Pilih Tahun</p>
                    <div
                        class="flex items-center justify-between gap-2 bg-slate-50 p-1.5 rounded-2xl border border-slate-200">
                        <button
                            class="flex-1 py-3 px-1 rounded-xl bg-[var(--active-blue)] text-white shadow-md font-black text-xl transition-all scale-105 border border-blue-800">
                            2026
                        </button>
                        <button
                            class="flex-1 py-3 px-1 rounded-xl text-slate-400 font-bold text-lg hover:bg-slate-200 hover:text-slate-600 transition-colors">
                            2027
                        </button>
                        <button
                            class="flex-1 py-3 px-1 rounded-xl text-slate-400 font-bold text-lg hover:bg-slate-200 hover:text-slate-600 transition-colors">
                            2028
                        </button>
                    </div>
                </div>
                <div class="bg-slate-100 p-1.5 rounded-2xl flex relative mt-2">
                    <button
                        class="flex-1 py-3 px-4 rounded-xl bg-white shadow-sm text-emerald-700 font-black text-lg text-center border border-slate-200 z-10 transition-all">
                        Keuntungan
                    </button>
                    <button
                        class="flex-1 py-3 px-4 rounded-xl text-slate-500 font-bold text-lg text-center hover:bg-slate-200/50 transition-all">
                        Omset
                    </button>
                </div>
            </div>
        </header>
        <main class="flex-1 px-6 py-6 space-y-8">
            <section
                class="bg-white p-6 rounded-[2rem] shadow-md border-2 border-emerald-100 relative overflow-hidden text-center">
                <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                <h2 class="text-slate-500 font-bold text-lg uppercase tracking-wider mb-2">Total Keuntungan 2026</h2>
                <p class="text-[2.75rem] leading-none font-black text-emerald-600 tracking-tight my-4">Rp 92.8jt</p>
                <div
                    class="inline-flex items-center gap-2 bg-emerald-50 px-4 py-2 rounded-full border border-emerald-100">
                    <span class="material-symbols-outlined text-emerald-600 text-xl">trending_up</span>
                    <span class="text-emerald-800 font-bold text-sm">+18% dari 2025</span>
                </div>
            </section>
            <section>
                <div class="flex items-center justify-between mb-4 px-1">
                    <h2 class="text-xl font-bold text-slate-800">Grafik Bulanan</h2>
                    <button
                        class="text-emerald-600 font-bold text-sm bg-emerald-50 px-3 py-1.5 rounded-lg flex items-center gap-1">
                        <span class="material-symbols-outlined text-lg">download</span>
                        Simpan
                    </button>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <div class="chart-bar-container">
                        <div class="chart-col">
                            <div class="bar bg-emerald-200" style="height: 40%;"></div>
                            <span class="bar-label">Jan</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-300" style="height: 48%;"></div>
                            <span class="bar-label">Feb</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-400" style="height: 65%;"></div>
                            <span class="bar-label">Mar</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-300" style="height: 55%;"></div>
                            <span class="bar-label">Apr</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-500" style="height: 80%;"></div>
                            <span class="bar-label">Mei</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-400" style="height: 60%;"></div>
                            <span class="bar-label">Jun</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-600" style="height: 90%;"></div>
                            <span class="bar-label">Jul</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-500" style="height: 75%;"></div>
                            <span class="bar-label">Agu</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-700" style="height: 98%;"></div>
                            <span class="bar-label">Sep</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-600" style="height: 85%;"></div>
                            <span class="bar-label">Okt</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-500" style="height: 70%;"></div>
                            <span class="bar-label">Nov</span>
                        </div>
                        <div class="chart-col">
                            <div class="bar bg-emerald-800" style="height: 100%;"></div>
                            <span class="bar-label">Des</span>
                        </div>
                    </div>
                </div>
            </section>
            <section class="pb-6">
                <h2 class="text-xl font-bold text-slate-800 mb-4 px-1">3 Bulan Terbaik</h2>
                <div class="space-y-4">
                    <div
                        class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-yellow-400 flex items-center gap-4">
                        <div
                            class="w-16 h-16 rounded-full bg-yellow-50 flex items-center justify-center shrink-0 border-2 border-yellow-100">
                            <span class="text-3xl">🥇</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-center">
                                <h3 class="font-black text-xl text-slate-900">Desember</h3>
                                <span
                                    class="text-xs font-bold bg-yellow-100 text-yellow-700 px-2 py-1 rounded-md">TERTINGGI</span>
                            </div>
                            <p class="text-emerald-600 font-bold text-2xl mt-1">Rp 13.100.000</p>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-slate-300 flex items-center gap-4">
                        <div
                            class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center shrink-0 border-2 border-slate-200">
                            <span class="text-3xl">🥈</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-black text-xl text-slate-900">September</h3>
                            <p class="text-emerald-600 font-bold text-2xl mt-1">Rp 12.400.000</p>
                        </div>
                    </div>
                    <div
                        class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-orange-300 flex items-center gap-4">
                        <div
                            class="w-16 h-16 rounded-full bg-orange-50 flex items-center justify-center shrink-0 border-2 border-orange-100">
                            <span class="text-3xl">🥉</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-black text-xl text-slate-900">Juli</h3>
                            <p class="text-emerald-600 font-bold text-2xl mt-1">Rp 11.500.000</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <nav
            class="fixed bottom-0 w-full bg-white border-t border-slate-200 pb-safe pt-2 z-20 max-w-md mx-auto rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
            <div class="flex justify-around items-end h-20 pb-4 px-2">
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1 p-2 text-slate-400 hover:text-slate-600">
                    <span class="material-symbols-outlined text-[32px]">dashboard</span>
                    <span class="text-xs font-bold">Beranda</span>
                </button>
                <button
                    class="nav-item active flex flex-col items-center justify-center w-full gap-1 p-2 text-emerald-600">
                    <span class="material-symbols-outlined text-[32px]">receipt_long</span>
                    <span class="text-xs font-bold">Riwayat</span>
                </button>
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1 p-2 text-slate-400 hover:text-slate-600">
                    <span class="material-symbols-outlined text-[32px]">inventory</span>
                    <span class="text-xs font-bold">Produk</span>
                </button>
                <button
                    class="nav-item flex flex-col items-center justify-center w-full gap-1 p-2 text-slate-400 hover:text-slate-600">
                    <span class="material-symbols-outlined text-[32px]">settings</span>
                    <span class="text-xs font-bold">Akun</span>
                </button>
            </div>
        </nav>
    </div>
</body>

</html>
