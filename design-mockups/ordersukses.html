<!DOCTYPE html>
<html lang="id">

<head>

    <title>Konfirmasi Sukses Pesanan SimpleBiz</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"

    <style type="text/tailwindcss">
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --surface: #ffffff;
            --bg: #f9fafb;
            --whatsapp: #25D366;
            --whatsapp-dark: #128C7E;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
        }
        .whatsapp-gradient {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="text-slate-900 bg-white">

        <main class="flex-1 flex flex-col items-center px-6 pt-10 pb-4 text-center space-y-6">
            <div class="animate-in zoom-in duration-500">
                <div
                    class="w-32 h-32 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                    <span class="material-symbols-outlined text-[80px] text-emerald-600 font-bold">check_circle</span>
                </div>
            </div>
            <div class="space-y-1">
                <h1 class="text-2xl font-extrabold text-slate-900 leading-tight">
                    Pesanan Berhasil Disimpan!
                </h1>
                <p class="text-slate-500 text-lg">
                    Data pesanan aman tercatat di sistem.
                </p>
            </div>
            <div class="w-full bg-slate-50 border border-slate-200 rounded-3xl p-5 shadow-sm text-left space-y-4">
                <div class="flex items-start gap-4 pb-4 border-b border-slate-200 border-dashed">
                    <div
                        class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-slate-400 border border-slate-200 shadow-sm shrink-0">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                    <div>
                        <p class="text-sm text-slate-500 font-medium uppercase tracking-wide">Pelanggan</p>
                        <p class="text-xl font-bold text-slate-900">Budi Santoso</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 pt-1">
                    <div>
                        <p class="text-sm text-slate-500 font-medium uppercase tracking-wide">Total</p>
                        <p class="text-2xl font-black text-slate-900">Rp 250.000</p>
                    </div>
                    <div>
                        <p class="text-sm text-emerald-600 font-bold uppercase tracking-wide flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">trending_up</span>
                            Untung
                        </p>
                        <p class="text-2xl font-black text-emerald-600">Rp 45.000</p>
                    </div>
                </div>
            </div>
            <div class="w-full bg-green-50 border-2 border-green-100 rounded-3xl p-5 shadow-sm space-y-4">

                <div class="flex items-center justify-center gap-3 pt-1">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input class="sr-only peer" type="checkbox" value="" />
                        <div
                            class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#25D366]">
                        </div>
                    </label>
                    <span class="text-base font-medium text-slate-600">Kirim otomatis setiap sukses</span>
                </div>
            </div>
        </main>
        <div class="p-6 pb-10 bg-white space-y-4 border-t border-slate-100">
            <button
                class="w-full h-16 bg-slate-800 hover:bg-slate-900 active:bg-slate-950 text-white rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-2xl">add_circle</span>
                <span class="text-xl font-bold">Buat Order Baru</span>
            </button>
            <button
                class="w-full h-16 bg-white border-2 border-slate-200 text-slate-600 hover:bg-slate-50 active:bg-slate-100 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-2xl">home</span>
